<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музичний стрімінг</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f13;
            --bg2: #18181f;
            --bg3: #22222c;
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --accent: #7c5cfc;
            --accent2: #a78bfa;
            --text: #f0eeff;
            --text2: #9490b0;
            --text3: #5e5a72;
            --success: #34d399;
            --danger: #f87171;
            --radius: 10px;
            --radius-lg: 16px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Layout */
        .app-layout {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 28px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
        .logo-name span { color: var(--accent2); }
        .header-search {
            flex: 1;
            max-width: 420px;
            margin-left: auto;
            position: relative;
        }
        .header-search input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 9px 16px 9px 40px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }
        .header-search input:focus { border-color: var(--accent); }
        .header-search input::placeholder { color: var(--text3); }
        .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text3); font-size: 16px; pointer-events: none;
        }

        /* Main content */
        .main {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: calc(100vh - 65px - 90px);
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }
        .sidebar-section { padding: 0 12px; margin-bottom: 8px; }
        .sidebar-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 4px 10px 8px;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text2);
            font-size: 14px;
            transition: all .15s;
            border: none; background: none; width: 100%; text-align: left;
        }
        .nav-item:hover { background: var(--bg3); color: var(--text); }
        .nav-item.active { background: rgba(124,92,252,0.15); color: var(--accent2); }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

        /* Content area */
        .content {
            overflow-y: auto;
            padding: 28px 32px;
        }
        .content-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .section-title { font-size: 20px; font-weight: 600; }

        /* Tab panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Track list */
        .tracks-list { width: 100%; }
        .tracks-header {
            display: grid;
            grid-template-columns: 40px 1fr 150px 90px 48px;
            gap: 12px;
            padding: 0 12px 10px;
            border-bottom: 1px solid var(--border);
        }
        .tracks-header span {
            font-size: 11px; font-weight: 600; color: var(--text3);
            text-transform: uppercase; letter-spacing: .06em;
        }
        .track-row {
            display: grid;
            grid-template-columns: 40px 1fr 150px 90px 48px;
            gap: 12px;
            align-items: center;
            padding: 9px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background .15s;
        }
        .track-row:hover { background: var(--bg3); }
        .track-row:hover .play-btn { display: flex; }
        .track-row:hover .track-num { display: none; }
        .track-row.playing { background: rgba(124,92,252,0.08); }
        .track-row.playing .track-num { color: var(--accent2); }
        .track-num { font-size: 13px; color: var(--text3); text-align: center; }
        .play-btn {
            display: none; align-items: center; justify-content: center;
            color: var(--text); background: none; border: none; cursor: pointer; font-size: 14px;
        }
        .track-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-genre-cell { display: flex; align-items: center; }
        .track-genre {
            font-size: 12px; color: var(--accent2);
            background: rgba(124,92,252,0.15);
            padding: 3px 10px; border-radius: 20px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px;
            display: inline-block;
        }
        .track-duration { font-size: 13px; color: var(--text2); }
        .track-actions { display: flex; align-items: center; justify-content: flex-end; }
        .icon-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text3); width: 32px; height: 32px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .icon-btn:hover { background: var(--bg3); color: var(--text); }
        .empty-state {
            text-align: center; padding: 60px 0;
            color: var(--text3); font-size: 14px;
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }

        /* Form card */
        .form-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }
        .form-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; font-weight: 500; color: var(--text2); }
        .form-group input, .form-group textarea, .form-group select {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
        }
        .form-group input::placeholder, .form-group textarea::placeholder {
            color: var(--text3);
        }
        .btn {
            padding: 9px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all .15s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #6a4de0; }
        .btn-secondary {
            background: var(--bg3);
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); color: var(--text); }

        /* Response block */
        .response-block {
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-top: 14px;
            font-size: 13px;
            display: none;
        }
        .response-block.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.25); color: var(--success); }
        .response-block.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--danger); }
        .response-block pre { font-family: 'Courier New', monospace; white-space: pre-wrap; word-break: break-all; }

        /* Genre pills */
        .genre-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .genre-pill {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: transparent;
            color: var(--text2);
            transition: all .15s;
        }
        .genre-pill:hover { background: var(--bg3); color: var(--text); }
        .genre-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Playlist card */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .playlist-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            cursor: pointer;
            transition: all .15s;
        }
        .playlist-card:hover { border-color: var(--border2); background: var(--bg3); }
        .playlist-thumb {
            width: 100%; aspect-ratio: 1;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(124,92,252,0.4) 0%, rgba(167,139,250,0.2) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .playlist-name { font-size: 14px; font-weight: 500; }
        .playlist-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }

        /* Auth section */
        .auth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Player bar */
        .player-bar {
            grid-row: 3;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 0 28px;
            height: 90px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .player-track { display: flex; align-items: center; gap: 14px; width: 280px; }
        .player-thumb {
            width: 48px; height: 48px;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(124,92,252,0.5) 0%, rgba(167,139,250,0.3) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .player-info .p-title { font-size: 14px; font-weight: 500; }
        .player-info .p-artist { font-size: 12px; color: var(--text2); }
        .player-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .player-btns { display: flex; align-items: center; gap: 8px; }
        .ctrl-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text2); border-radius: 50%;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .ctrl-btn:hover { color: var(--text); background: var(--bg3); }
        .ctrl-btn.main {
            width: 42px; height: 42px;
            background: var(--accent);
            color: #fff;
        }
        .ctrl-btn.main:hover { background: #6a4de0; }
        .progress-bar {
            display: flex; align-items: center; gap: 10px; width: 100%;
        }
        .progress-time { font-size: 11px; color: var(--text3); min-width: 35px; }
        .progress-time.right { text-align: right; }
        .progress-track {
            flex: 1; height: 3px; background: var(--bg3);
            border-radius: 2px; position: relative; cursor: pointer;
        }
        .progress-fill {
            height: 100%; background: var(--accent); border-radius: 2px;
            width: 0%;
            transition: width .1s linear;
        }
        .player-volume { display: flex; align-items: center; gap: 8px; width: 180px; justify-content: flex-end; }
        .volume-icon { color: var(--text2); }
        .volume-slider {
            width: 80px; height: 3px;
            -webkit-appearance: none;
            background: var(--bg3); border-radius: 2px; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            border-radius: 50%; background: var(--text);
        }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
        }
        .status-badge.online { background: rgba(52,211,153,0.12); color: var(--success); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        .toast {
            position: fixed; bottom: 110px; right: 24px;
            background: var(--bg2); border: 1px solid var(--border2);
            color: var(--text); border-radius: var(--radius);
            padding: 12px 18px; font-size: 13px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transform: translateY(10px); opacity: 0;
            transition: all .25s; pointer-events: none; z-index: 100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
    </style>
</head>
<body>
<div class="app-layout">

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🎵</div>
            <span class="logo-name">Музичний <span>стрімінг</span></span>
        </div>
        <div class="header-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="globalSearch" placeholder="Пошук треків, виконавців..." oninput="handleSearch(this.value)">
        </div>
        <div id="serverStatus" class="status-badge online" style="margin-left:16px; cursor:pointer;" onclick="checkHealth()">
            <span class="status-dot"></span> Онлайн
        </div>
    </header>

    <!-- Main grid -->
    <div class="main">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Меню</div>
                <button class="nav-item active" onclick="showTab('tracks', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                    Усі треки
                </button>
                <button class="nav-item" onclick="showTab('playlists', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    Плейлисти
                </button>
                <button class="nav-item" onclick="showTab('auth', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Профіль
                </button>
                <button class="nav-item" onclick="showTab('upload', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                    Завантажити
                </button>
            </div>
            <div class="sidebar-section" style="margin-top: auto; padding-top: 12px;">
                <button class="nav-item" onclick="checkHealth()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    Статус API
                </button>
            </div>
        </aside>

        <!-- Content -->
        <main class="content">

            <!-- Tracks tab -->
            <div id="tab-tracks" class="tab-panel active">
                <div class="content-header">
                    <h2 class="section-title">Треки</h2>
                    <button class="btn btn-secondary" onclick="fetchTracks()">⟳ Оновити</button>
                </div>

                <div class="genre-filters" id="genreFilters">
                    <button class="genre-pill active" onclick="filterByGenre('all', this)">Всі</button>
                </div>

                <div id="tracksContainer">
                    <div class="empty-state">
                        <div class="empty-icon">🎵</div>
                        <p>Немає треків. Завантажте перший!</p>
                    </div>
                </div>
            </div>

            <!-- Playlists tab -->
            <div id="tab-playlists" class="tab-panel">
                <div class="content-header">
                    <h2 class="section-title">Плейлисти</h2>
                </div>
                <div class="form-card">
                    <h3>Новий плейлист</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Назва</label>
                            <input id="playlistName" type="text" placeholder="Моя добірка">
                        </div>
                        <div class="form-group">
                            <label>Опис</label>
                            <input id="playlistDesc" type="text" placeholder="Необов'язково">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="createPlaylist()">Створити плейлист</button>
                    <div id="createPlaylistResult" class="response-block"></div>
                </div>

                <div class="form-card">
                    <h3>Додати трек до плейлиста</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Плейлист</label>
                            <select id="selectPlaylist">
                                <option value="">— оберіть плейлист —</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Трек</label>
                            <select id="selectTrack">
                                <option value="">— оберіть трек —</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addTrackToPlaylist()">Додати трек</button>
                    <div id="addToPlaylistResult" class="response-block"></div>
                </div>

                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
                    <h3 style="font-size:15px; font-weight:600;">Мої плейлисти</h3>
                    <button class="btn btn-secondary" onclick="fetchPlaylists()">⟳ Оновити</button>
                </div>
                <div class="playlist-grid" id="playlistsGrid">
                    <div class="empty-state" style="grid-column:1/-1">
                        <div class="empty-icon">📂</div>
                        <p>Немає плейлистів</p>
                    </div>
                </div>
            </div>

            <!-- Auth tab -->
            <div id="tab-auth" class="tab-panel">
                <div class="content-header">
                    <h2 class="section-title">Авторизація</h2>
                </div>
                <div class="auth-grid">
                    <div class="form-card">
                        <h3>📝 Реєстрація</h3>
                        <div class="form-group" style="margin-bottom:10px">
                            <label>Username</label>
                            <input id="regUsername" type="text" placeholder="username">
                        </div>
                        <div class="form-group" style="margin-bottom:10px">
                            <label>Email</label>
                            <input id="regEmail" type="email" placeholder="email@example.com">
                        </div>
                        <div class="form-group" style="margin-bottom:16px">
                            <label>Пароль</label>
                            <input id="regPassword" type="password" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary" onclick="register()">Зареєструватися</button>
                        <div id="regResult" class="response-block"></div>
                    </div>
                    <div class="form-card">
                        <h3>🔑 Вхід</h3>
                        <div class="form-group" style="margin-bottom:10px">
                            <label>Username</label>
                            <input id="loginUsername" type="text" placeholder="username">
                        </div>
                        <div class="form-group" style="margin-bottom:16px">
                            <label>Пароль</label>
                            <input id="loginPassword" type="password" placeholder="••••••••">
                        </div>
                        <button class="btn btn-primary" onclick="login()">Увійти</button>
                        <div id="loginResult" class="response-block"></div>
                    </div>
                </div>
            </div>

            <!-- Upload tab -->
            <div id="tab-upload" class="tab-panel">
                <div class="content-header">
                    <h2 class="section-title">Додати трек</h2>
                </div>
                <div class="form-card">
                    <h3>Інформація про трек</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Назва треку *</label>
                            <input id="trackTitle" type="text" placeholder="Назва пісні">
                        </div>
                        <div class="form-group">
                            <label>Виконавець *</label>
                            <input id="trackArtist" type="text" placeholder="Ім'я виконавця">
                        </div>
                        <div class="form-group">
                            <label>Жанр *</label>
                            <input id="trackGenre" type="text" placeholder="Pop, Rock, Jazz...">
                        </div>
                        <div class="form-group">
                            <label>Тривалість (сек)</label>
                            <input id="trackDuration" type="number" placeholder="240">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addTrack()">Додати трек</button>
                    <div id="addTrackResult" class="response-block"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- Player bar -->
    <div class="player-bar">
        <div class="player-track">
            <div class="player-thumb">🎵</div>
            <div class="player-info">
                <div class="p-title" id="playerTitle">Оберіть трек</div>
                <div class="p-artist" id="playerArtist">—</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="player-btns">
                <button class="ctrl-btn" title="Попередній" onclick="prevTrack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button class="ctrl-btn main" id="playPauseBtn" onclick="togglePlay()">
                    <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg id="pauseIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="ctrl-btn" title="Наступний" onclick="nextTrack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
            </div>
            <div class="progress-bar">
                <span class="progress-time" id="currentTime">0:00</span>
                <div class="progress-track" onclick="seekAudio(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-time right" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="player-volume">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'http://localhost:3001/api';
let allTracks = [];
let currentTrackIdx = -1;
let isPlaying = false;
let audio = new Audio();
let progressInterval = null;

audio.volume = 0.8;
audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', updateProgress);

function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec < 10 ? '0' : ''}${sec}`;
}

function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}

function showResult(id, data, isError) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    el.className = `response-block ${isError ? 'error' : 'success'}`;
    el.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
}

function showTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'tracks') fetchTracks();
    if (name === 'playlists') fetchPlaylists();
}

async function fetchTracks() {
    try {
        const r = await fetch(`${API_URL}/tracks`);
        const data = await r.json();
        allTracks = data;
        renderTracks(data);
        renderGenreFilters(data);
        const sel = document.getElementById('selectTrack');
        if (sel) {
            sel.innerHTML = '<option value="">— оберіть трек —</option>' +
                data.map(t => `<option value="${t.id}">${t.title} — ${t.artist}</option>`).join('');
        }
    } catch(e) {
        showToast('Помилка: сервер недоступний', 'error');
    }
}

function renderTracks(tracks) {
    const c = document.getElementById('tracksContainer');
    if (!tracks.length) {
        c.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div><p>Треків не знайдено</p></div>';
        return;
    }
    const rows = tracks.map((t, i) => {
        const globalIdx = allTracks.indexOf(t);
        const playing = currentTrackIdx === globalIdx ? 'playing' : '';
        return `<div class="track-row ${playing}" onclick="playTrack(${globalIdx})">
            <div style="display:flex;align-items:center;justify-content:center;">
                <span class="track-num">${i + 1}</span>
                <button class="play-btn">&#9654;</button>
            </div>
            <div class="track-info">
                <span class="track-name">${t.title}</span>
                <span class="track-artist">${t.artist}</span>
            </div>
            <div class="track-genre-cell">
                <span class="track-genre">${t.genre}</span>
            </div>
            <span class="track-duration">${fmt(t.duration)}</span>
            <div class="track-actions">
                <button class="icon-btn" onclick="event.stopPropagation(); deleteTrack(${t.id})" title="Видалити">&#10005;</button>
            </div>
        </div>`;
    }).join('');
    c.innerHTML = '<div class="tracks-list"><div class="tracks-header"><span>#</span><span>Назва</span><span>Жанр</span><span>Тривалість</span><span></span></div>' + rows + '</div>';
}

function renderGenreFilters(tracks) {
    const genres = [...new Set(tracks.map(t => t.genre))];
    const c = document.getElementById('genreFilters');
    const existing = genres.map(g => `<button class="genre-pill" onclick="filterByGenre('${g}', this)">${g}</button>`).join('');
    c.innerHTML = `<button class="genre-pill active" onclick="filterByGenre('all', this)">Всі</button>${existing}`;
}

function filterByGenre(genre, btn) {
    document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    if (genre === 'all') { renderTracks(allTracks); return; }
    renderTracks(allTracks.filter(t => t.genre.toLowerCase() === genre.toLowerCase()));
}

function handleSearch(q) {
    if (!q) { renderTracks(allTracks); return; }
    const filtered = allTracks.filter(t =>
        t.title.toLowerCase().includes(q.toLowerCase()) ||
        t.artist.toLowerCase().includes(q.toLowerCase())
    );
    renderTracks(filtered);
}

function playTrack(idx) {
    currentTrackIdx = idx;
    const t = allTracks[idx];
    document.getElementById('playerTitle').textContent = t.title;
    document.getElementById('playerArtist').textContent = t.artist;
    document.getElementById('totalTime').textContent = fmt(t.duration);
    if (t.url) {
        audio.src = `http://localhost:3001${t.url}`;
        audio.play().catch(() => {});
        isPlaying = true;
    } else {
        isPlaying = true;
    }
    updatePlayBtn();
    renderTracks(allTracks);
    showToast(`▶ ${t.title} — ${t.artist}`);
}

function togglePlay() {
    if (currentTrackIdx === -1 && allTracks.length > 0) { playTrack(0); return; }
    isPlaying = !isPlaying;
    if (isPlaying) audio.play().catch(() => {}); else audio.pause();
    updatePlayBtn();
}

function updatePlayBtn() {
    document.getElementById('playIcon').style.display = isPlaying ? 'none' : 'block';
    document.getElementById('pauseIcon').style.display = isPlaying ? 'block' : 'none';
}

function prevTrack() {
    if (allTracks.length === 0) return;
    playTrack((currentTrackIdx - 1 + allTracks.length) % allTracks.length);
}
function nextTrack() {
    if (allTracks.length === 0) return;
    playTrack((currentTrackIdx + 1) % allTracks.length);
}

function updateProgress() {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('currentTime').textContent = fmt(audio.currentTime);
}

function seekAudio(e) {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
}

function setVolume(v) { audio.volume = v / 100; }

async function addTrack() {
    const title = document.getElementById('trackTitle').value.trim();
    const artist = document.getElementById('trackArtist').value.trim();
    const genre = document.getElementById('trackGenre').value.trim();
    const duration = parseInt(document.getElementById('trackDuration').value) || 0;
    if (!title || !artist || !genre) { showToast('Заповніть усі обов\'язкові поля', 'error'); return; }
    try {
        const r = await fetch(`${API_URL}/tracks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, artist, genre, duration })
        });
        const data = await r.json();
        showResult('addTrackResult', data, !r.ok);
        if (r.ok) {
            showToast('Трек додано!');
            ['trackTitle','trackArtist','trackGenre','trackDuration'].forEach(id => document.getElementById(id).value = '');
        }
    } catch(e) { showResult('addTrackResult', e.message, true); }
}

async function deleteTrack(id) {
    if (!confirm('Видалити трек?')) return;
    try {
        const r = await fetch(`${API_URL}/tracks/${id}`, { method: 'DELETE' });
        if (r.ok) { showToast('Трек видалено'); fetchTracks(); }
    } catch(e) { showToast('Помилка видалення', 'error'); }
}

async function fetchPlaylists() {
    try {
        const r = await fetch(`${API_URL}/playlists`);
        const data = await r.json();
        const c = document.getElementById('playlistsGrid');
        const sel = document.getElementById('selectPlaylist');
        if (sel) {
            sel.innerHTML = '<option value="">— оберіть плейлист —</option>' +
                data.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }
        if (!data.length) {
            c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📂</div><p>Немає плейлистів</p></div>';
            return;
        }
        c.innerHTML = data.map(p => `
            <div class="playlist-card" onclick="viewPlaylist(${p.id}, '${p.name.replace(/'/g,'&#39;')}')">
                <div class="playlist-thumb">🎧</div>
                <div class="playlist-name">${p.name}</div>
                <div class="playlist-meta">${p.tracks.length} треків</div>
            </div>`).join('');
    } catch(e) { showToast('Помилка завантаження плейлистів', 'error'); }
}

async function createPlaylist() {
    const name = document.getElementById('playlistName').value.trim();
    const description = document.getElementById('playlistDesc').value.trim();
    if (!name) { showToast('Введіть назву', 'error'); return; }
    try {
        const r = await fetch(`${API_URL}/playlists`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description })
        });
        const data = await r.json();
        showResult('createPlaylistResult', data, !r.ok);
        if (r.ok) { showToast('Плейлист створено!'); fetchPlaylists(); document.getElementById('playlistName').value = ''; document.getElementById('playlistDesc').value = ''; }
    } catch(e) { showResult('createPlaylistResult', e.message, true); }
}

async function addTrackToPlaylist() {
    const playlistId = document.getElementById('selectPlaylist').value;
    const trackId = document.getElementById('selectTrack').value;
    if (!playlistId || !trackId) { showToast('Оберіть плейлист і трек', 'error'); return; }
    try {
        const r = await fetch(`${API_URL}/playlists/${playlistId}/tracks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ trackId: parseInt(trackId) })
        });
        const data = await r.json();
        showResult('addToPlaylistResult', data, !r.ok);
        if (r.ok) { showToast('Трек додано до плейлиста!'); fetchPlaylists(); }
    } catch(e) { showResult('addToPlaylistResult', e.message, true); }
}

async function viewPlaylist(id, name) {
    try {
        const r = await fetch(`${API_URL}/playlists/${id}`);
        const p = await r.json();
        const trackNames = p.tracks.map(tid => {
            const t = allTracks.find(t => t.id == tid);
            return t ? `${t.title} — ${t.artist}` : `ID: ${tid}`;
        });
        showToast(`${name}: ${trackNames.length ? trackNames.join(', ') : 'порожній'}`);
    } catch(e) {}
}

async function register() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!username || !email || !password) { showToast('Заповніть усі поля', 'error'); return; }
    try {
        const r = await fetch(`${API_URL}/auth/register`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await r.json();
        showResult('regResult', data, !r.ok);
        if (r.ok) showToast('Реєстрація успішна!');
    } catch(e) { showResult('regResult', e.message, true); }
}

async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) { showToast('Введіть дані', 'error'); return; }
    try {
        const r = await fetch(`${API_URL}/auth/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await r.json();
        showResult('loginResult', data, !r.ok);
        if (r.ok) showToast(`Ласкаво просимо, ${data.user.username}!`);
    } catch(e) { showResult('loginResult', e.message, true); }
}

async function checkHealth() {
    try {
        const r = await fetch(`${API_URL}/health`);
        const data = await r.json();
        showToast(`Сервер: ${data.status}`, 'success');
    } catch(e) {
        document.getElementById('serverStatus').textContent = '● Офлайн';
        document.getElementById('serverStatus').className = 'status-badge';
        document.getElementById('serverStatus').style.cssText += '; background:rgba(248,113,113,0.12); color:#f87171;';
        showToast('Сервер недоступний', 'error');
    }
}

fetchTracks();
</script>
</body>
</html>
